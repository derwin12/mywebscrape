<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Answer a few questions to troubleshoot common xLights problems.">
    <title>xLights Troubleshooter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">xLights Troubleshooter</a>
            <a class="nav-link text-light" href="https://xlights.info">Back to Sequence Index</a>
        </div>
    </nav>

    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb" id="breadcrumb"></ol>
        </nav>

        <div class="card mb-3">
            <div class="card-body">
                <h2 id="node-question" class="card-title"></h2>
                <div id="node-options"></div>
            </div>
        </div>

        <div class="card mb-3 d-none" id="node-solution">
            <div class="card-body">
                <h2 id="solution-title" class="card-title"></h2>
                <ol id="solution-steps"></ol>
                <div id="solution-links"></div>
            </div>
        </div>

        <div class="text-center mb-4">
            <button type="button" class="btn btn-secondary me-2" id="back-btn">Back</button>
            <button type="button" class="btn btn-outline-danger" id="restart-btn">Start Over</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/tree.js"></script>
</body>
</html>
